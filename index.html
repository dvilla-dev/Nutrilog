        <div class="field"><label>Calorie</label><input class="input" type="number" step="0.1" min="0" id="ee-kcal" value="${entry.kcal}"></div>
        <div class="row-3">
          <div class="field"><label>Proteine</label><input class="input" type="number" step="0.1" min="0" id="ee-p" value="${entry.protein}"></div>
          <div class="field"><label>Carb</label><input class="input" type="number" step="0.1" min="0" id="ee-c" value="${entry.carbs}"></div>
          <div class="field"><label>Grassi</label><input class="input" type="number" step="0.1" min="0" id="ee-fat" value="${entry.fat}"></div>
        </div>
        <div class="row-3">
          <div class="field"><label>Fibre</label><input class="input" type="number" step="0.1" min="0" id="ee-fib" value="${entry.fiber}"></div>
          <div class="field"><label>Zucch.</label><input class="input" type="number" step="0.1" min="0" id="ee-sug" value="${entry.sugar}"></div>
          <div class="field"><label>Sodio mg</label><input class="input" type="number" step="1" min="0" id="ee-sod" value="${entry.sodium}"></div>
        </div>
      </div>
    </details>

    <button class="btn btn-primary" id="ee-save">Salva modifiche</button>
    <button class="btn btn-danger" id="ee-delete" style="margin-top:8px">${I.trash}<span>Rimuovi dal diario</span></button>
    <button class="btn btn-ghost" id="ee-cancel" style="margin-top:6px">Annulla</button>
  `;
  openSheet(html);

  let selectedMeal = meal;
  const $ = (id) => document.getElementById(id);
  const recalc = () => {
    const g = num($('ee-grams').value, 0);
    const k = num($('ee-kcal').value, 0);
    const p = num($('ee-p').value, 0);
    const c = num($('ee-c').value, 0);
    const f = num($('ee-fat').value, 0);
    $('ee-t-kcal').textContent = round(k * g / 100);
    $('ee-t-p').textContent = round(p * g / 100, 1);
    $('ee-t-c').textContent = round(c * g / 100, 1);
    $('ee-t-f').textContent = round(f * g / 100, 1);
  };
  ['ee-grams', 'ee-kcal', 'ee-p', 'ee-c', 'ee-fat'].forEach(id => {
    const el = $(id); if (el) el.oninput = recalc;
  });

  $('ee-meal-pick').addEventListener('click', (e) => {
    const b = e.target.closest('[data-meal-pick]');
    if (!b) return;
    selectedMeal = b.dataset.mealPick;
    $('ee-meal-pick').querySelectorAll('button').forEach(x => x.classList.toggle('sel', x.dataset.mealPick === selectedMeal));
  });

  $('ee-save').onclick = async () => {
    const g = num($('ee-grams').value, 0);
    if (g <= 0) { toast('Quantità non valida'); return; }
    const patch = {
      grams: g,
      kcal: num($('ee-kcal').value, entry.kcal),
      protein: num($('ee-p').value, entry.protein),
      carbs: num($('ee-c').value, entry.carbs),
      fat: num($('ee-fat').value, entry.fat),
      fiber: num($('ee-fib').value, entry.fiber),
      sugar: num($('ee-sug').value, entry.sugar),
      sodium: num($('ee-sod').value, entry.sodium),
    };
    if (selectedMeal !== meal) {
      await moveDiaryEntry(meal, entryId, selectedMeal);
      await updateDiaryEntry(selectedMeal, entryId, patch);
    } else {
      await updateDiaryEntry(meal, entryId, patch);
    }
    closeSheet();
    toast('Modifiche salvate');
    render();
  };
  $('ee-delete').onclick = async () => {
    if (!confirm('Rimuovere questa voce dal diario?')) return;
    await removeFromDiary(meal, entryId);
    closeSheet();
    toast('Rimosso');
    render();
  };
  $('ee-cancel').onclick = closeSheet;
}

/* ─── GOALS SHEET (con obiettivi per giorno settimana) ───── */
const _goalsEditor = {
  activeDay: 'default',      // 'default' | '0'..'6'  (0=Dom)
  workingSchema: null,       // clone modificabile dello schema
};

function openGoalsSheet() {
  _goalsEditor.activeDay = 'default';
  _goalsEditor.workingSchema = JSON.parse(JSON.stringify(state.goalsSchema || emptyGoalsSchema()));
  renderGoalsSheet();
}

function renderGoalsSheet() {
  const schema = _goalsEditor.workingSchema;
  const day = _goalsEditor.activeDay;
  const isDefault = day === 'default';
  const effective = isDefault
    ? schema.default
    : { ...schema.default, ...(schema.perWeekday[day] || {}) };
  const hasOverride = !isDefault && !!schema.perWeekday[day];

  const dayChips = [
    { k: 'default', label: 'Base' },
    { k: '1', label: 'Lun' },
    { k: '2', label: 'Mar' },
    { k: '3', label: 'Mer' },
    { k: '4', label: 'Gio' },
    { k: '5', label: 'Ven' },
    { k: '6', label: 'Sab' },
    { k: '0', label: 'Dom' },
  ];

  const subtext = isDefault
    ? 'Base: applicati a tutti i giorni, salvo override specifici.'
    : (hasOverride ? 'Override attivo per questo giorno.' : 'Questo giorno eredita dai valori Base. Modifica per creare un override.');

  const html = `
    <h2 class="sheet-title">Obiettivi giornalieri</h2>
    <p class="sheet-sub">${esc(subtext)}</p>

    <div class="day-chips">
      ${dayChips.map(c => {
        const override = c.k !== 'default' && !!schema.perWeekday[c.k];
        return `<button type="button" class="day-chip ${day === c.k ? 'sel' : ''} ${override ? 'has-override' : ''}" data-day-chip="${c.k}">${esc(c.label)}${override ? '<span class="override-dot"></span>' : ''}</button>`;
      }).join('')}
    </div>

    ${!isDefault && !hasOverride ? `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;font-size:12px;color:var(--text-2);line-height:1.5">
        <span style="flex:1">Questo giorno eredita i valori Base. Modifica i campi per creare un override.</span>
      </div>
    ` : ''}

    <form id="goals-form">
      <div class="field">
        <label>Calorie (kcal)</label>
        <input class="input" type="number" name="calories" min="500" max="6000" value="${effective.calories}" required>
      </div>
      <div class="row-3">
        <div class="field"><label>Proteine (g)</label><input class="input" type="number" name="protein" min="0" max="500" value="${effective.protein}" required></div>
        <div class="field"><label>Carb (g)</label><input class="input" type="number" name="carbs" min="0" max="800" value="${effective.carbs}" required></div>
        <div class="field"><label>Grassi (g)</label><input class="input" type="number" name="fat" min="0" max="300" value="${effective.fat}" required></div>
      </div>
      <div class="row-3">
        <div class="field"><label>Fibre (g)</label><input class="input" type="number" name="fiber" min="0" max="200" value="${effective.fiber}" required></div>
        <div class="field"><label>Zucch (g)</label><input class="input" type="number" name="sugar" min="0" max="500" value="${effective.sugar}" required></div>
        <div class="field"><label>Sodio (mg)</label><input class="input" type="number" name="sodium" min="0" max="10000" value="${effective.sodium}" required></div>
      </div>

      ${!isDefault && hasOverride ? `
        <button class="btn btn-danger" type="button" id="goals-reset-day" style="margin-bottom:8px">Rimuovi override per questo giorno</button>
      ` : ''}

      <button class="btn btn-primary" type="submit">${isDefault ? 'Salva Base' : (hasOverride ? 'Aggiorna override' : 'Crea override per ' + esc(dayChips.find(c => c.k === day).label))}</button>
    </form>
  `;

  openSheet(html);

  // Day chip switching: legge i valori correnti nel form, li salva temporaneamente e ridisegna
  document.querySelectorAll('[data-day-chip]').forEach(btn => {
    btn.onclick = () => {
      const form = document.getElementById('goals-form');
      const fd = new FormData(form);
      const values = {};
      for (const k of ['calories','protein','carbs','fat','fiber','sugar','sodium']) values[k] = num(fd.get(k));
      // Scrivi temporaneamente per non perdere le modifiche non salvate
      if (_goalsEditor.activeDay === 'default') {
        _goalsEditor.workingSchema.default = values;
      } else {
        // Confronta con default: se identico e non era già override, non creare
        const baseline = _goalsEditor.workingSchema.default;
        const diff = {};
        let differs = false;
        for (const k of ['calories','protein','carbs','fat','fiber','sugar','sodium']) {
          if (values[k] !== baseline[k]) { diff[k] = values[k]; differs = true; }
        }
        if (differs) _goalsEditor.workingSchema.perWeekday[_goalsEditor.activeDay] = values;
        // se non differs e non c'era un override, lascialo stare
      }
      _goalsEditor.activeDay = btn.dataset.dayChip;
      renderGoalsSheet();
    };
  });

  // Form reference (presets rimossi: solo personalizzazione manuale)
  const form = document.getElementById('goals-form');

  // Reset override
  const resetBtn = document.getElementById('goals-reset-day');
  if (resetBtn) {
    resetBtn.onclick = () => {
      delete _goalsEditor.workingSchema.perWeekday[_goalsEditor.activeDay];
      renderGoalsSheet();
    };
  }

  // Submit
  form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const values = {};
    for (const k of ['calories','protein','carbs','fat','fiber','sugar','sodium']) values[k] = num(fd.get(k));
    if (_goalsEditor.activeDay === 'default') {
      _goalsEditor.workingSchema.default = values;
    } else {
      _goalsEditor.workingSchema.perWeekday[_goalsEditor.activeDay] = values;
    }
    await saveGoalsSchema(_goalsEditor.workingSchema);
    closeSheet();
    toast('Obiettivi salvati');
    render();
  };
}

      ${all.length === 0 ? `<div class="subtle-list-empty">Nessun alimento salvato</div>` : list.length === 0 ? `<div class="subtle-list-empty">Nessun risultato</div>` : list.slice(0, 100).map(f => `

  document.getElementById('new-custom').onclick = () => openCustomFoodEditor(null);

  document.getElementById('cf-import').onclick = () => handleImportFoodsCSV();
  document.querySelectorAll('[data-edit-custom]').forEach(b => {

      await deleteCustomFood(b.dataset.delCustom);

/* ─── DATABASE ALIMENTI ───────────────────────────────────
   Permette di visualizzare, modificare e aggiungere alimenti
   al DB CREA-INRAN. Le modifiche sono salvate come override
   in storage e propagate al cloud via auto-sync.
   ──────────────────────────────────────────────────────── */
async function openDbFoodsSheet(filter = '', showHidden = false) {
  // Refresh cache per essere certi di avere lo stato più recente
  await refreshDbFoodsCache();
  // Per la lista usiamo getAllDbFoods se vogliamo vedere anche i nascosti
  const list = showHidden ? await getAllDbFoods() : (state.dbFoods || []);
  const allList = await getAllDbFoods();
  const hiddenCount = allList.filter(f => f._hidden).length;
  const fLow = stripAccents(filter.trim().toLowerCase());
  const filtered = !fLow ? list : list.filter(f => {
    const hay = stripAccents((f.name + ' ' + (f.brand || '')).toLowerCase());
    return fLow.split(/\s+/).every(t => hay.includes(t));
  });
  const totalMod = list.filter(f => f._modified).length;
  const totalAdd = list.filter(f => f._kind === 'added').length;
  const html = `
    <h2 class="sheet-title">Database alimenti${showHidden ? ' (con rimossi)' : ''}</h2>
    <p class="sheet-sub">${list.length} alimenti${totalMod || totalAdd ? ` · ${totalMod} modificat${totalMod === 1 ? 'o' : 'i'}, ${totalAdd} aggiunt${totalAdd === 1 ? 'o' : 'i'}` : ' · valori CREA-INRAN ufficiali'}${hiddenCount && !showHidden ? ` · ${hiddenCount} rimoss${hiddenCount === 1 ? 'o' : 'i'}` : ''}</p>

    <button class="btn btn-primary" id="db-new" style="margin-bottom:10px">${I.plus}<span>Nuovo alimento</span></button>

    <div class="field" style="margin-bottom:10px">
      <input class="input" id="db-search" placeholder="Cerca nel database..." value="${esc(filter)}" autocomplete="off">
    </div>

    <div id="db-list" style="max-height:60vh;overflow-y:auto">
      ${filtered.length === 0 ? `<div class="subtle-list-empty">${fLow ? 'Nessun risultato' : 'Database vuoto'}</div>` : filtered.slice(0, 100).map(f => {
        const idAttr = f._kind === 'added' ? `add-${f._addId}` : `idx-${f._index}`;
        const modBadge = f._modified ? `<span style="display:inline-block;background:var(--accent-dim);color:var(--accent);font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:0.05em;text-transform:uppercase">MOD</span>` : '';
        const addBadge = f._kind === 'added' ? `<span style="display:inline-block;background:rgba(85,200,255,0.15);color:#5cf;font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:0.05em;text-transform:uppercase">NUOVO</span>` : '';
        const hidBadge = f._hidden ? `<span style="display:inline-block;background:rgba(255,69,58,0.15);color:var(--danger);font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:0.05em;text-transform:uppercase">RIMOSSO</span>` : '';
        return `
        <div style="display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--border);${f._hidden ? 'opacity:0.55' : ''}" data-db-row="${idAttr}">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.name)}${modBadge}${addBadge}${hidBadge}</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:2px">${esc(f.brand || 'CREA-INRAN')} · ${round(f.kcal)} kcal · P${round(f.protein)} C${round(f.carbs)} G${round(f.fat)}</div>
          </div>
          ${f._hidden
            ? `<button class="icon-btn" data-restore-db="${idAttr}" aria-label="Ripristina" style="color:var(--accent)">${I.refresh}</button>`
            : `<button class="icon-btn" data-edit-db="${idAttr}" aria-label="Modifica">${I.edit}</button>`
          }
        </div>`;
      }).join('') + (filtered.length > 100 ? `<div style="padding:14px;text-align:center;font-size:12px;color:var(--text-3)">${filtered.length - 100} altri risultati. Affina la ricerca.</div>` : '')}
    </div>

    ${hiddenCount > 0 ? `
      <button class="btn btn-ghost" id="db-toggle-hidden" style="margin-top:14px;font-size:13px">
        ${showHidden ? 'Nascondi alimenti rimossi' : `Mostra ${hiddenCount} alimenti rimossi`}
      </button>
    ` : ''}
  `;
  openSheet(html);
  const searchInput = document.getElementById('db-search');
  if (searchInput) {
    let t;
    searchInput.oninput = () => {
      clearTimeout(t);
      t = setTimeout(() => openDbFoodsSheet(searchInput.value, showHidden), 220);
    };
  }
  document.getElementById('db-new').onclick = () => openDbFoodEditor(null);
  document.querySelectorAll('[data-edit-db]').forEach(b => {
    b.onclick = () => {
      const ref = b.dataset.editDb;
      if (ref.startsWith('add-')) {
        const addId = ref.slice(4);
        const food = list.find(f => f._kind === 'added' && f._addId === addId);
        if (food) openDbFoodEditor(food);
      } else if (ref.startsWith('idx-')) {
        const idx = parseInt(ref.slice(4), 10);
        const food = list.find(f => f._kind === 'builtin' && f._index === idx);
        if (food) openDbFoodEditor(food);
      }
    };
  });
  document.querySelectorAll('[data-restore-db]').forEach(b => {
    b.onclick = async () => {
      const ref = b.dataset.restoreDb;
      if (!ref.startsWith('idx-')) return;
      const idx = parseInt(ref.slice(4), 10);
      await sd(`dbHidden:${state.user.userId}:${idx}`);
      await refreshDbFoodsCache();
      if (cloudBackup && cloudBackup.scheduleSync) cloudBackup.scheduleSync();
      toast('Ripristinato');
      openDbFoodsSheet(filter, showHidden);
    };
  });
  const toggleBtn = document.getElementById('db-toggle-hidden');
  if (toggleBtn) toggleBtn.onclick = () => openDbFoodsSheet(filter, !showHidden);
}

function openDbFoodEditor(food) {
  // food può essere null (nuovo), oppure un elemento da getLocalFoods()
  const isNew = !food;
  const isBuiltin = food && food._kind === 'builtin';
  const isAdded = food && food._kind === 'added';
  const f = food || { name: '', brand: '', kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, sodium: 0 };
  const titleText = isNew ? 'Nuovo alimento DB' : (isBuiltin ? 'Modifica alimento DB' : 'Modifica alimento aggiunto');
  const subText = isBuiltin
    ? (food._modified ? 'Modifica già attiva. Puoi continuare a editare o ripristinare i valori CREA-INRAN.' : 'Stai per modificare un alimento CREA-INRAN. I tuoi valori sostituiranno quelli ufficiali.')
    : (isAdded ? 'Alimento aggiunto da te. Puoi modificarlo o eliminarlo.' : 'Aggiungi un nuovo alimento al database. Sarà ricercabile dalla schermata Cerca.');

  const html = `
    <h2 class="sheet-title">${titleText}</h2>
    <p class="sheet-sub">${esc(subText)}</p>
    <form id="db-food-form">
      <div class="field"><label>Nome *</label><input class="input" name="name" value="${esc(f.name)}" required autocomplete="off"></div>
      <div class="field"><label>Marca / categoria (opzionale)</label><input class="input" name="brand" value="${esc(f.brand || '')}" autocomplete="off"></div>

      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        <div class="field"><label>Kcal / 100g</label><input class="input" name="kcal" type="number" inputmode="decimal" step="0.1" min="0" value="${f.kcal}"></div>
        <div class="field"><label>Proteine (g)</label><input class="input" name="protein" type="number" inputmode="decimal" step="0.1" min="0" value="${f.protein}"></div>
        <div class="field"><label>Carboidrati (g)</label><input class="input" name="carbs" type="number" inputmode="decimal" step="0.1" min="0" value="${f.carbs}"></div>
        <div class="field"><label>Grassi (g)</label><input class="input" name="fat" type="number" inputmode="decimal" step="0.1" min="0" value="${f.fat}"></div>
        <div class="field"><label>Fibre (g)</label><input class="input" name="fiber" type="number" inputmode="decimal" step="0.1" min="0" value="${f.fiber}"></div>
        <div class="field"><label>Zuccheri (g)</label><input class="input" name="sugar" type="number" inputmode="decimal" step="0.1" min="0" value="${f.sugar}"></div>
      </div>
      <div class="field"><label>Sodio (mg / 100g)</label><input class="input" name="sodium" type="number" inputmode="decimal" step="1" min="0" value="${f.sodium}"></div>

      <button class="btn btn-primary" type="submit" style="margin-top:6px">Salva</button>
      ${isBuiltin && food._modified ? `<button type="button" class="btn btn-secondary" id="db-reset" style="margin-top:8px">${I.refresh}<span>Ripristina valori CREA-INRAN</span></button>` : ''}
      ${isBuiltin ? `<button type="button" class="btn btn-secondary" id="db-hide" style="margin-top:8px;color:var(--danger)">${I.trash}<span>Rimuovi dal database</span></button>` : ''}
      ${isAdded ? `<button type="button" class="btn btn-secondary" id="db-delete" style="margin-top:8px;color:var(--danger)">${I.trash}<span>Elimina alimento</span></button>` : ''}
      <button type="button" class="btn btn-ghost" id="db-cancel" style="margin-top:8px">Annulla</button>
    </form>
  `;
  openSheet(html);
  document.getElementById('db-cancel').onclick = () => openDbFoodsSheet();
  document.getElementById('db-food-form').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const userId = state.user.userId;
    const data = {
      name: String(fd.get('name') || '').trim(),
      brand: String(fd.get('brand') || '').trim(),

    await refreshDbFoodsCache();

    // Salva nascondiglio + rimuovi eventuale override

/* ─── TEMPLATES SHEET ──────────────────────────────────── */
/* ─── CALENDARIO + RIEPILOGO SETTIMANALE ──────────────────
   Mostra ±DIARY_RETENTION_DAYS giorni con possibilità di
   navigare e vedere il riepilogo settimanale (Lun-Dom).
   ──────────────────────────────────────────────────────── */
function getMondayOfWeek(iso) {
  // ISO "YYYY-MM-DD" → ritorna il lunedì della stessa settimana (ISO week)
  const d = new Date(iso);
  const day = d.getDay(); // 0=Dom, 1=Lun, ...
  const diff = day === 0 ? -6 : 1 - day; // se domenica torna indietro di 6, altrimenti porta a lun
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

async function computeDayTotalsKcal(date) {
  const d = await sg(`diary:${state.user.userId}:${date}`);
  if (!d) return 0;
  let total = 0;
  for (const meal of ['breakfast','lunch','dinner','snack']) {
    for (const item of (d[meal] || [])) {
      total += (item.kcal || 0) * (item.grams || 0) / 100;
    }
  }
  return total;
}

async function computeWeekSummary(anyDateInWeek) {
  // Restituisce: { from, to, days: [{date, kcal, hasData}], totalKcal, daysWithData,
  //               goalSum, deltaTotal, avgDelta }
  const monday = getMondayOfWeek(anyDateInWeek);
  const days = [];
  let totalKcal = 0;
  let daysWithData = 0;
  let goalSum = 0;
  for (let i = 0; i < 7; i++) {
    const date = shiftDate(monday, i);
    const goals = getGoalsForDate(date);
    const kcal = await computeDayTotalsKcal(date);
    const hasData = kcal > 0;
    days.push({ date, kcal, hasData, goalKcal: goals.calories || 0 });
    if (hasData) {
      totalKcal += kcal;
      daysWithData++;
    }
    goalSum += (goals.calories || 0);
  }
  const sunday = shiftDate(monday, 6);
  return {
    from: monday,
    to: sunday,
    days,
    totalKcal,
    daysWithData,
    goalSum,
    deltaTotal: totalKcal - goalSum, // positivo = eccesso, negativo = difetto
  };
}

async function openCalendarSheet() {
  // Finestra navigabile: 14 giorni indietro (retention) + 14 giorni avanti
  const today = todayISO();
  const todayMs = new Date(today).getTime();
  const cutoffMs = todayMs - (DIARY_RETENTION_DAYS * 24 * 60 * 60 * 1000);
  const futureMs = todayMs + (DIARY_RETENTION_DAYS * 24 * 60 * 60 * 1000);

  // Mostriamo 6 settimane: 3 indietro + corrente + 2 avanti
  const currentMonday = getMondayOfWeek(today);
  const weeks = [];
  for (let w = -3; w <= 2; w++) {
    const monday = shiftDate(currentMonday, 7 * w);
    weeks.push(monday);
  }

  // Calcola totali per ogni giorno (per badge dei kcal e dot indicator)
  const dailyTotals = {};
  for (const monday of weeks) {
    for (let i = 0; i < 7; i++) {
      const date = shiftDate(monday, i);
      dailyTotals[date] = await computeDayTotalsKcal(date);
    }
  }

  // Riepilogo della settimana SELEZIONATA (quella di state.date)
  const summary = await computeWeekSummary(state.date);

  const monthLabels = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const dayHead = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

  function dateMs(iso) { return new Date(iso).getTime(); }
  function isInRetention(iso) {
    const ms = dateMs(iso);
    return ms >= cutoffMs && ms <= futureMs;
  }
  function fmtMonth(iso) {
    const m = parseInt(iso.slice(5,7), 10) - 1;
    return monthLabels[m] || '';
  }
  function fmtDay(iso) {
    return parseInt(iso.slice(8,10), 10);
  }

  let weeksHtml = '';
  for (const monday of weeks) {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const date = shiftDate(monday, i);
      const isToday = date === today;
      const isSelected = date === state.date;
      const inRange = isInRetention(date);
      const kcal = dailyTotals[date] || 0;
      const cls = ['cal-cell'];
      if (isToday) cls.push('cal-today');
      if (isSelected) cls.push('cal-selected');
      if (!inRange) cls.push('cal-disabled');
      days.push(`
        <button class="${cls.join(' ')}" ${inRange ? `data-cal-pick="${date}"` : 'disabled'}>
          <div>${fmtDay(date)}</div>
          <div class="cal-month">${fmtMonth(date)}</div>
          ${kcal > 0 ? '<div class="cal-dot"></div>' : ''}
        </button>
      `);
    }
    weeksHtml += `<div class="cal-grid">${days.join('')}</div>`;
  }

  // Riepilogo settimana
  const sumPDate = (() => {
    const fromD = parseInt(summary.from.slice(8,10), 10);
    const toD = parseInt(summary.to.slice(8,10), 10);
    const fromM = monthLabels[parseInt(summary.from.slice(5,7), 10) - 1];
    const toM = monthLabels[parseInt(summary.to.slice(5,7), 10) - 1];
    return fromM === toM ? `${fromD}–${toD} ${toM}` : `${fromD} ${fromM} – ${toD} ${toM}`;
  })();
  const goalAvgPerDay = summary.daysWithData > 0
    ? summary.days.filter(d => d.hasData).reduce((acc, d) => acc + d.goalKcal, 0) / summary.daysWithData
    : 0;
  const consumedAvgPerDay = summary.daysWithData > 0 ? summary.totalKcal / summary.daysWithData : 0;
  const avgDelta = consumedAvgPerDay - goalAvgPerDay;
  const deltaSign = summary.deltaTotal > 0 ? '+' : '';
  const deltaColor = Math.abs(summary.deltaTotal) < 100 ? 'var(--text-2)' : (summary.deltaTotal > 0 ? 'var(--warning, #fb0)' : '#5cf');
  const deltaLabel = summary.deltaTotal > 0 ? 'in eccesso' : (summary.deltaTotal < 0 ? 'in difetto' : 'in linea');
  const noGoal = summary.goalSum === 0;

  const summaryHtml = `
    <div class="cal-week-summary">
      <div style="font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Riepilogo settimana ${esc(sumPDate)}</div>
      ${summary.daysWithData === 0 ? `
        <div style="font-size:13px;color:var(--text-2);padding:6px 0">Nessun dato per questa settimana</div>
      ` : noGoal ? `
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <div style="font-size:13px;color:var(--text-2)">Calorie totali</div>
          <div style="font-size:18px;font-weight:700">${round(summary.totalKcal)}</div>
        </div>
        <div style="font-size:11px;color:var(--text-3)">${summary.daysWithData}/7 giorni con dati. Imposta un obiettivo in Profilo per vedere il delta.</div>
      ` : `
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <div style="font-size:13px;color:var(--text-2)">Calorie totali</div>
          <div style="font-size:18px;font-weight:700">${round(summary.totalKcal)} <span style="font-size:13px;color:var(--text-3);font-weight:500">/ ${round(summary.goalSum)}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <div style="font-size:13px;color:var(--text-2)">${esc(deltaLabel)}</div>
          <div style="font-size:16px;font-weight:700;color:${deltaColor}">${deltaSign}${round(summary.deltaTotal)} kcal</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--text-3);padding-top:8px;border-top:1px solid var(--border)">
          <div>Media giornaliera: ${round(consumedAvgPerDay)} kcal</div>
          <div>${summary.daysWithData}/7 giorni</div>
        </div>
      `}
    </div>
  `;

  const html = `
    <h2 class="sheet-title">Calendario</h2>
    <p class="sheet-sub">Tap su un giorno per visualizzarlo. Disponibile da ${DIARY_RETENTION_DAYS} giorni fa a ${DIARY_RETENTION_DAYS} giorni avanti.</p>

    <div class="cal-grid">
      ${dayHead.map(d => `<div class="cal-head">${d}</div>`).join('')}
    </div>
    ${weeksHtml}

    ${summaryHtml}

    <button class="btn btn-secondary" id="cal-jump-today">Vai a oggi</button>
  `;
  openSheet(html);

  document.querySelectorAll('[data-cal-pick]').forEach(b => {
    b.onclick = async () => {
      const d = b.dataset.calPick;
      state.date = d;
      await loadDiary(state.date);
      closeSheet();
      render();
    };
  });
  const jumpToday = document.getElementById('cal-jump-today');
  if (jumpToday) jumpToday.onclick = async () => {
    state.date = todayISO();
    await loadDiary(state.date);
    closeSheet();
    render();
  };
}

/* ═══════════════════════════════════════════════════════════
   CLOUD BACKUP — GitHub Gist (riusabile per altre app)
   ═══════════════════════════════════════════════════════════
   Modulo autonomo pensato per essere copiato tra app diverse.
   Una stessa coppia (token, gistId) può ospitare backup di più
   app distinte: ogni app scrive un file col nome `${appId}.json`
   all'interno dello stesso gist.

   USO IN ALTRA APP:
   1. Copia l'intero blocco cloudBackup (indipendente dal resto).
   2. Cambia APP_ID in app.js della nuova app.
   3. La stessa UI "Gestisci sincronizzazione cloud" funziona ovunque.
   ═══════════════════════════════════════════════════════════ */
const APP_ID = 'nutrilog';   // ⚠ cambia per altre app (es. 'sleeplog')
const APP_LABEL = 'NutriLog'; // etichetta user-facing
const APP_VERSION = '1.13.0';

const cloudBackup = {
  // --- Config storage (localStorage diretto, indipendente da sg/ss) ---
  CFG_KEY: 'cloudBackup::config', // non prefissato LS_PREFIX: è config globale multi-app

  getConfig() {
    try {
      const raw = localStorage.getItem(this.CFG_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  },
  setConfig(cfg) {
    try { localStorage.setItem(this.CFG_KEY, JSON.stringify(cfg)); return true; }
    catch (e) { dlog('ERR saveCloudCfg: ' + e.message); return false; }
  },
  clearConfig() {
    try { localStorage.removeItem(this.CFG_KEY); return true; } catch (_) { return false; }
  },
  isConfigured() {
    const c = this.getConfig();
    return !!(c && c.token && c.gistId);
  },

  // --- Low-level GitHub API ---
  async _ghFetch(path, opts = {}) {
    const cfg = this.getConfig();
    if (!cfg || !cfg.token) throw new Error('Token GitHub non configurato');
    const method = opts.method || 'GET';
    dlog('GH ' + method + ' ' + path);

    const headers = {
      'Accept': 'application/vnd.github+json',
      'Authorization': 'Bearer ' + cfg.token,
      'X-GitHub-Api-Version': '2022-11-28',
    };
    if (opts.body) headers['Content-Type'] = 'application/json';
    if (opts.headers) {
      for (const k of Object.keys(opts.headers)) headers[k] = opts.headers[k];
    }

    const buildInit = (withSignal) => {
      const init = { method, headers };
      if (opts.body != null) init.body = opts.body;
      if (withSignal) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 20000);
        init.signal = ctrl.signal;
        init._timer = timer;
      }
      return init;
    };

    const useSignal = !window._ghAbortBroken;
    let init = buildInit(useSignal);
    let res;
    try {
      res = await fetch('https://api.github.com' + path, init);
    } catch (e) {
      if (init._timer) clearTimeout(init._timer);
      dlog('GH ' + path + ' FETCH FAIL: ' + (e.name || '') + ' / ' + (e.message || ''));
      if (useSignal && (e.name === 'DataCloneError' || /clone/i.test(e.message || ''))) {
        // WebView non supporta AbortSignal: marca e ritenta senza
        window._ghAbortBroken = true;
        dlog('GH ' + path + ': retry without AbortSignal (WebView quirk)');
        try {
          res = await fetch('https://api.github.com' + path, buildInit(false));
        } catch (e2) {
          dlog('GH ' + path + ' RETRY FAIL: ' + (e2.name || '') + ' / ' + (e2.message || ''));
          throw new Error('Rete: ' + (e2.message || 'fetch failed') + ' (' + path + ')');
        }
      } else if (e.name === 'AbortError') {
        throw new Error('Timeout su ' + path + ' (20s)');
      } else {
        throw new Error('Rete: ' + (e.message || 'fetch failed') + ' (' + path + ')');
      }
    }
    if (init._timer) clearTimeout(init._timer);

    if (!res.ok) {
      let msg = `GitHub ${res.status}`;
      try { const j = await res.json(); if (j.message) msg += `: ${j.message}`; } catch (_) {}
      if (res.status === 401) msg += ' (token non valido o scaduto)';
      if (res.status === 403) msg += ' (permessi insufficienti — serve scope "gist")';
      if (res.status === 404) msg += ' (gist non trovato)';
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return await res.json();
  },

  // --- Token validation ---
  async validateToken(token) {
    dlog('GH validateToken: start');
    const baseHeaders = {
      'Accept': 'application/vnd.github+json',
      'Authorization': 'Bearer ' + token,
    };

    const tryFetch = async (withSignal) => {
      const init = { method: 'GET', headers: baseHeaders };
      let timer = null;
      if (withSignal) {
        const ctrl = new AbortController();
        timer = setTimeout(() => ctrl.abort(), 15000);
        init.signal = ctrl.signal;
      }
      try {
        const r = await fetch('https://api.github.com/user', init);
        if (timer) clearTimeout(timer);
        return r;
      } catch (e) {
        if (timer) clearTimeout(timer);
        throw e;
      }
    };

    let res;
    const useSignal = !window._ghAbortBroken;
    try {
      res = await tryFetch(useSignal);
    } catch (e) {
      dlog('GH validateToken FETCH FAIL: ' + (e.name || '') + ' / ' + (e.message || ''));
      if (useSignal && (e.name === 'DataCloneError' || /clone/i.test(e.message || ''))) {
        window._ghAbortBroken = true;
        dlog('GH validateToken: retry without AbortSignal (WebView quirk detected)');
        try { res = await tryFetch(false); }
        catch (e2) {
          dlog('GH validateToken RETRY FAIL: ' + (e2.name || '') + ' / ' + (e2.message || ''));
          throw new Error('Rete: ' + (e2.message || 'fetch failed') + ' — impossibile contattare api.github.com');
        }
      } else if (e.name === 'AbortError') {
        throw new Error('Timeout: GitHub non risponde (15s)');
      } else {
        throw new Error('Rete: ' + (e.message || 'fetch failed'));
      }
    }
    dlog('GH validateToken: HTTP ' + res.status);
    if (!res.ok) {
      if (res.status === 401) throw new Error('Token non valido');
      throw new Error('GitHub HTTP ' + res.status);
    }
    let u;
    try { u = await res.json(); }
    catch (e) { throw new Error('Risposta GitHub non parsabile'); }
    const scopes = (res.headers.get('x-oauth-scopes') || '').split(',').map(s => s.trim());
    dlog('GH scopes: ' + JSON.stringify(scopes));
    if (scopes.length && scopes[0] !== '' && !scopes.includes('gist')) {
      throw new Error('Al token manca lo scope "gist". Generane uno nuovo selezionando solo "gist".');
    }
    return { login: u.login, avatar_url: u.avatar_url };
  },

  // --- Gist lifecycle ---
  async createGist(description = 'Personal app backups') {
    const data = await this._ghFetch('/gists', {
      method: 'POST',
      body: JSON.stringify({
        description,
        public: false,
        files: {
          'README.md': {
            content: `# Personal app backups\n\nThis secret gist holds backups for apps built by the owner.\nEach file is named after the app that owns it.\n\nCreated: ${new Date().toISOString()}\n`,
          }
        },
      }),
    });
    return data.id;
  },

  async listAppsInGist() {
    const cfg = this.getConfig();
    if (!cfg || !cfg.gistId) return [];
    const g = await this._ghFetch('/gists/' + cfg.gistId);
    return Object.keys(g.files || {})
      .filter(f => f.endsWith('.json'))
      .map(f => ({
        filename: f,
        appId: f.replace(/\.json$/, ''),
        size: g.files[f].size,
      }));
  },

  // --- Backup read/write (app-scoped) ---
  /**
   * @param {string} appId identificativo dell'app (es. 'nutrilog')
   * @param {object} payload dati da salvare (verrà serializzato in JSON)
   */
  async push(appId, payload) {
    const cfg = this.getConfig();
    if (!cfg || !cfg.gistId) throw new Error('Gist non configurato');
    const filename = `${appId}.json`;
    const wrapped = {
      appId,
      schemaVersion: 1,
      savedAt: new Date().toISOString(),
      payload,
    };
    await this._ghFetch('/gists/' + cfg.gistId, {
      method: 'PATCH',
      body: JSON.stringify({
        files: { [filename]: { content: JSON.stringify(wrapped, null, 2) } }
      }),
    });
    // Aggiorna metadata last-sync
    const c2 = this.getConfig() || {};
    c2.lastSync = c2.lastSync || {};
    c2.lastSync[appId] = new Date().toISOString();
    this.setConfig(c2);
    return wrapped;
  },

  async pull(appId) {
    const cfg = this.getConfig();
    if (!cfg || !cfg.gistId) throw new Error('Gist non configurato');
    const filename = `${appId}.json`;
    const g = await this._ghFetch('/gists/' + cfg.gistId);
    const file = (g.files || {})[filename];
    if (!file) return null;
    // Se il content è stato troncato (>1MB), recupera dal raw_url
    let content = file.content;
    if (file.truncated && file.raw_url) {
      const r = await fetch(file.raw_url);
      if (!r.ok) throw new Error('Impossibile leggere il file del gist');
      content = await r.text();
    }
    try { return JSON.parse(content); }
    catch (e) { throw new Error('File di backup corrotto: ' + e.message); }
  },
};

/* ─── EXPORT / IMPORT HANDLERS (UI) ─────────────────────── */
function cloudStatusLabel() {
  if (!cloudBackup.isConfigured()) return 'Non configurato';
  const cfg = cloudBackup.getConfig();
  const last = cfg.lastSync && cfg.lastSync[APP_ID];
  if (!last) return `Connesso come @${cfg.githubLogin || '?'}`;
  const ago = timeAgo(new Date(last));
  return `@${cfg.githubLogin || '?'} · ultimo sync ${ago}`;
}
function timeAgo(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'pochi secondi fa';
  if (s < 3600) return Math.floor(s / 60) + ' min fa';
  if (s < 86400) return Math.floor(s / 3600) + ' h fa';
  const days = Math.floor(s / 86400);
  if (days === 1) return 'ieri';
  if (days < 7) return days + ' giorni fa';
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

function suggestMealByTime() {
  const h = new Date().getHours();
  // Logica pratica per pasti italiani:
  //   05-10  → Colazione
  //   10-15  → Pranzo  (include la fascia "sto per pranzare" delle 11-12)
  //   15-18  → Spuntino (merenda pomeridiana)
  //   18-23  → Cena
  //   23-05  → Cena (rientri tardi, ultimo pasto)
  if (h >= 5 && h < 10) return 'breakfast';
  if (h >= 10 && h < 15) return 'lunch';
  if (h >= 15 && h < 18) return 'snack';
  return 'dinner'; // 18-23 e 23-05
}

/* ─── CSV EXPORT/IMPORT ALIMENTI ──────────────────────── */
const CSV_FIELDS = ['name', 'brand', 'kcal', 'protein', 'carbs', 'fat', 'fiber', 'sugar', 'sodium'];
const CSV_HEADER_IT = ['Nome', 'Marca', 'Calorie', 'Proteine', 'Carboidrati', 'Grassi', 'Fibre', 'Zuccheri', 'Sodio'];

function csvEscape(v) {
  const s = String(v == null ? '' : v);
  if (/[",\n;]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function buildCSV(rows, includeBuiltins = true) {
  const out = [CSV_HEADER_IT.join(';')];
  // BOM per Excel + delimiter ; (locale italiano)
  for (const r of rows) {
    out.push(CSV_FIELDS.map(f => csvEscape(r[f])).join(';'));
  }
  return '\uFEFF' + out.join('\r\n') + '\r\n';
}

function parseCSV(text) {
  // Rimuovi BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // Detect delimiter: prima riga, scegli tra ; e ,
  const firstLine = text.split(/\r?\n/, 1)[0] || '';
  const delim = firstLine.includes(';') ? ';' : ',';

  const rows = [];
  let i = 0, field = '', row = [], inQuotes = false;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQuotes = true; i++; continue; }
    if (c === delim) { row.push(field); field = ''; i++; continue; }
    if (c === '\n' || c === '\r') {
      row.push(field); field = '';
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = [];
      if (c === '\r' && text[i + 1] === '\n') i++;
      i++; continue;
    }
    field += c; i++;
  }
  if (field !== '' || row.length) { row.push(field); if (row.length > 1 || row[0] !== '') rows.push(row); }

  if (rows.length === 0) return [];
  // Header detection: cerca chiavi italiane o inglesi
  const header = rows[0].map(h => h.trim().toLowerCase());
  const headerMap = {
    nome: 'name', name: 'name',
    marca: 'brand', brand: 'brand', brands: 'brand',
    calorie: 'kcal', kcal: 'kcal', calories: 'kcal', energia: 'kcal',
    proteine: 'protein', protein: 'protein', proteins: 'protein',
    carboidrati: 'carbs', carbs: 'carbs', carbohydrates: 'carbs',
    grassi: 'fat', fat: 'fat', lipidi: 'fat',
    fibre: 'fiber', fiber: 'fiber', fibra: 'fiber',
    zuccheri: 'sugar', sugar: 'sugar', sugars: 'sugar', zucchero: 'sugar',
    sodio: 'sodium', sodium: 'sodium', sale: 'sodium',
  };
  const cols = header.map(h => headerMap[h] || null);
  if (!cols.includes('name') || !cols.includes('kcal')) {
    throw new Error('Il CSV deve avere almeno colonne "Nome" e "Calorie"');
  }
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const obj = {};
    for (let c = 0; c < cols.length; c++) {
      if (!cols[c]) continue;
      let v = rows[r][c] != null ? String(rows[r][c]).trim() : '';
      if (cols[c] === 'name' || cols[c] === 'brand') obj[cols[c]] = v;
      else {
        v = v.replace(',', '.'); // virgola decimale italiana
        obj[cols[c]] = num(v, 0);
      }
    }
    if (obj.name) out.push(obj);
  }
  return out;
}

function downloadCSV(filename, text) {
  const blob = new Blob([text], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
}

function pickCSVFile() {
  return new Promise((resolve, reject) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.csv,text/csv,application/vnd.ms-excel,application/csv';
    input.onchange = () => {
      const f = input.files && input.files[0];
      if (!f) return reject(new Error('Nessun file selezionato'));
      const reader = new FileReader();
      reader.onload = () => { try { resolve(reader.result); } catch (e) { reject(e); } };
      reader.onerror = () => reject(new Error('Errore lettura file'));
      reader.readAsText(f, 'UTF-8');
    };
    input.click();
  });
}

function compressImage(file, maxDim = 1280, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = () => reject(new Error('Errore lettura file'));
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1];
      resolve({ base64, mediaType: 'image/jpeg', dataUrl });
    };
    img.onerror = () => reject(new Error('Immagine non valida'));
    reader.readAsDataURL(file);
  });
}

const AI_PROMPT = `Sei un assistente nutrizionale. Analizza l'immagine fornita: può mostrare un piatto di cibo o un'etichetta nutrizionale.

Rispondi SOLO con JSON valido (no markdown, no backtick, no testo introduttivo).

{

  "name": "string (descrizione breve in italiano del cibo, vuoto se incerto)",
  "brand": "string (marca se visibile sull'etichetta, altrimenti vuoto)",
  "portionGrams": 0,

  "fat": 0,
  "fiber": 0,
  "sugar": 0,
  "sodium": 0,
  "confidence": "low|medium|high",
  "notes": "string (note brevi se rilevante, max 80 chars)"
}

Regole:
- Se la foto mostra un'ETICHETTA nutrizionale: estrai i valori per 100g (o per porzione se solo quello è disponibile, indicandolo in notes). Includi marca se visibile.
- Se la foto mostra un PIATTO: stima i valori per 100g del cibo principale. Imposta portionGrams a una stima ragionevole della porzione visibile.
- "sodium" è in MILLIGRAMMI (mg).
- I valori di kcal/macro sono per 100g.
- Se non riesci a identificare cibo nell'immagine: imposta detected=false, gli altri campi a 0.
- confidence: "high" per etichette leggibili, "medium" per piatti riconoscibili, "low" per casi incerti.`;

async function callGeminiVision(apiKey, imgBase64, mediaType) {
  // Lista di modelli da provare in ordine. Free tier al 2026.
  // Se il primo fallisce con 404 (modello non disponibile), prova il successivo.
  const MODELS = [
    'gemini-2.5-flash-lite',
    'gemini-2.5-flash',
    'gemini-flash-latest',
  ];
  const body = {
    contents: [{
      role: 'user',
      parts: [
        { text: AI_PROMPT + '\n\nAnalizza questa foto e restituisci il JSON richiesto.' },
        { inline_data: { mime_type: mediaType, data: imgBase64 } }
      ]
    }],
    generationConfig: {
      response_mime_type: 'application/json',
      temperature: 0.2,
      max_output_tokens: 1024,
    },
  };

  let lastErr = null;
  for (const model of MODELS) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
    let res;
    try {
      res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } catch (e) {
      lastErr = new Error('Rete: ' + (e.message || 'fetch failed'));
      continue;
    }
    if (res.ok) {
      const data = await res.json();
      dlog('Gemini OK with model: ' + model);
      const text = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts || [])
        .map(p => p.text || '').join('').trim();
      if (!text) throw new Error('Risposta vuota da Gemini');
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('JSON non trovato nella risposta');
      return JSON.parse(match[0]);
    }
    // Errore non-ok: estrai dettaglio
    let detail = '';
    try { const j = await res.json(); detail = (j.error && j.error.message) || ''; } catch (_) {}
    dlog(`Gemini ${model} HTTP ${res.status}: ${detail.slice(0,100)}`);
    // Casi che NON sono "modello non disponibile" → errore secco, no fallback
    if (res.status === 400 && /API key/i.test(detail)) throw new Error('API key non valida');
    if (res.status === 403) throw new Error('API key non autorizzata o quota esaurita');
    if (res.status === 429) throw new Error('Troppe richieste, attendi qualche secondo');
    // 404 = modello non disponibile, prova il prossimo
    if (res.status === 404) {
      lastErr = new Error(`Modello ${model} non disponibile`);
      continue;
    }
    // Altri errori → fail
    throw new Error(`Gemini HTTP ${res.status}${detail ? ': ' + detail : ''}`);
  }
  throw lastErr || new Error('Nessun modello Gemini disponibile');
}

  const mealLabels = { breakfast: 'Colazione', lunch: 'Pranzo', dinner: 'Cena', snack: 'Spuntino' };
  openSheet(`
    <h2 class="sheet-title">Copia ${mealLabels[meal]}</h2>
    <p class="sheet-sub">Caricamento giorni precedenti...</p>
    <div class="spinner"></div>
  `);
  const days = await findRecentDaysWithMeal(meal, state.date, 14);
  const cur = state.diary[meal] || [];
  const hasCurrent = cur.length > 0;
  const pDate = prettyDate(state.date);

  let listHtml;
  if (days.length === 0) {
    listHtml = `<div class="subtle-list-empty" style="padding:40px 20px">Nessun pasto trovato<br><small style="color:var(--text-3);font-size:12px">Nei 60 giorni precedenti non hai registrato alimenti in ${mealLabels[meal].toLowerCase()}</small></div>`;
  } else {
    listHtml = days.map(d => {
      const pd = prettyDate(d.date);
      const kcal = d.items.reduce((s, it) => s + it.kcal * it.grams / 100, 0);
      const preview = d.items.slice(0, 3).map(it => it.name).join(' · ') +
        (d.items.length > 3 ? ` +${d.items.length - 3}` : '');
      return `
        <div class="copy-day-row" data-copy-src="${esc(d.date)}">
          <div class="copy-day-main">
            <div class="copy-day-title">${esc(pd.main)}<span class="copy-day-sub"> · ${esc(pd.sub)}</span></div>
            <div class="copy-day-preview">${esc(preview)}</div>
          </div>
          <div class="copy-day-kcal">${round(kcal)}<small>kcal</small></div>
        </div>`;
    }).join('');
  }

  openSheet(`
    <h2 class="sheet-title">Copia ${mealLabels[meal]}</h2>
    <p class="sheet-sub">Verso ${pDate.main.toLowerCase()} ${pDate.sub ? '· ' + pDate.sub : ''}. Seleziona il giorno da cui copiare.</p>

    ${hasCurrent ? `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,176,32,0.08);border:1px solid rgba(255,176,32,0.2);border-radius:10px;margin-bottom:14px">
        <div style="flex:1;font-size:12px;color:var(--warning)">${cur.length} aliment${cur.length === 1 ? 'o' : 'i'} già present${cur.length === 1 ? 'e' : 'i'} in questo pasto</div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);cursor:pointer">
          <input type="checkbox" id="replace-mode" style="accent-color:var(--accent)">Sostituisci
        </label>
      </div>
    ` : ''}

    <div class="copy-day-list">${listHtml}</div>
  `);

  document.querySelectorAll('[data-copy-src]').forEach(row => {
    row.onclick = async () => {
      const fromDate = row.dataset.copySrc;
      const replaceEl = document.getElementById('replace-mode');
      const mode = (replaceEl && replaceEl.checked) ? 'replace' : 'append';
      const n = await copyMealFromDate(fromDate, meal, mode);
      closeSheet();
      toast(`${n} aliment${n === 1 ? 'o copiato' : 'i copiati'}`);
      render();
    };
  });
}
/* ─── CUSTOM PICKER (for add-custom-to-meal) ─────────── */
function openCustomPicker(meal) {
  if (state.customFoods.length === 0) {
    toast('Nessun alimento salvato — creane uno dal profilo');
    return;
  }
  const html = `
    <h2 class="sheet-title">I miei alimenti</h2>
    <p class="sheet-sub">Scegli un alimento da aggiungere.</p>
    <div>
      ${state.customFoods.map(f => `
        <div class="result" data-pick-my="${esc(f.id)}">
          <div class="result-img-placeholder">${I.leaf}</div>
          <div class="result-main">
            <div class="result-name">${esc(f.name)}<span class="result-tag">Mio</span></div>
            <div class="result-meta">${esc(f.brand || 'Senza marca')}</div>
          </div>
          <div class="result-kcal">${round(f.kcal)}<div style="font-size:10px;color:var(--text-3);font-weight:400">kcal/100g</div></div>
        </div>`).join('')}
    </div>
  `;
  openSheet(html);
  document.querySelectorAll('[data-pick-my]').forEach(el => {
    el.onclick = () => {
      const f = state.customFoods.find(x => x.id === el.dataset.pickMy);
      openAddFood({...f, _custom: true}, meal);
    };
  });
}

/* ═══════════════════════════════════════════════════════════
   BINDINGS
   ═══════════════════════════════════════════════════════════ */
function bindApp() {
  // tabbar
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = async () => {
      const next = t.dataset.tab;
      // Se l'utente entra dalla tab bar senza pasto specificato:
      // - search: default colazione (può cambiarlo dal foglio quantità)
      // - photo: pasto suggerito dall'orario corrente
      if (next === 'search' && state.tab !== next) {
        state.targetMeal = 'breakfast';
      }
      if (next === 'photo' && state.tab !== next) {
        state.targetMeal = suggestMealByTime();
      }
      state.tab = next;
      render();
    };
  });

  // photo tab actions
  const phMealPick = document.getElementById('ph-meal-pick');
  if (phMealPick) {
    phMealPick.querySelectorAll('[data-meal-pick]').forEach(b => {
      b.onclick = () => {
        state.targetMeal = b.dataset.mealPick;
        phMealPick.querySelectorAll('button').forEach(x => x.classList.toggle('sel', x.dataset.mealPick === state.targetMeal));
      };
    });
  }
  const phCam = document.getElementById('ph-camera');
  const phGal = document.getElementById('ph-gallery');
  const phInputCam = document.getElementById('ph-input-cam');
  const phInputGal = document.getElementById('ph-input-gal');
  const phSetup = document.getElementById('ph-setup');
  if (phCam) phCam.onclick = () => phInputCam.click();
  if (phGal) phGal.onclick = () => phInputGal.click();
  if (phSetup) phSetup.onclick = () => openAiSetupSheet();
  const onPhotoPick = (input) => {
    if (!input) return;
    input.onchange = async () => {
      const f = input.files && input.files[0];
      if (!f) return;
      await analyzeFoodPhoto(f, state.targetMeal || suggestMealByTime());
    };
  };
  onPhotoPick(phInputCam);
  onPhotoPick(phInputGal);

  // date nav
  document.querySelectorAll('[data-date]').forEach(b => {
    b.onclick = async () => {
      const direction = b.dataset.date === 'next' ? 1 : -1;
      const newDate = shiftDate(state.date, direction);
      const todayMs = new Date(todayISO()).getTime();
      const newMs = new Date(newDate).getTime();
      // Limiti: 14 giorni indietro (retention) e 14 giorni avanti (planning)
      if (direction === -1) {
        const cutoffMs = todayMs - (DIARY_RETENTION_DAYS * 24 * 60 * 60 * 1000);
        if (newMs < cutoffMs) {
          toast(`I dati oltre ${DIARY_RETENTION_DAYS} giorni vengono cancellati automaticamente`);
          return;
        }
      } else {
        const futureMs = todayMs + (DIARY_RETENTION_DAYS * 24 * 60 * 60 * 1000);
        if (newMs > futureMs) {
          toast(`Pianificazione disponibile fino a ${DIARY_RETENTION_DAYS} giorni in avanti`);
          return;
        }
      }
      state.date = newDate;
      await loadDiary(state.date);
      render();
    };
  });

  // open calendar on date label tap
  const calBtn = document.querySelector('[data-open-calendar]');
  if (calBtn) calBtn.onclick = () => openCalendarSheet();

  // populate week summary on today tab
  if (state.tab === 'today') {
    populateWeekSummaryCard().catch(e => dlog('week summary FAIL: ' + e.message));
  }

  // food delete
  document.querySelectorAll('[data-del]').forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      const [meal, id] = b.dataset.del.split(':');
      await removeFromDiary(meal, id);
      render();
    };
  });

  // food edit (tap on item)
  document.querySelectorAll('[data-edit]').forEach(row => {
    row.onclick = () => {
      const [meal, id] = row.dataset.edit.split(':');
      openEditEntry(meal, id);
    };
  });

  // copy meal from previous day
  document.querySelectorAll('[data-copy-meal]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      openCopyMealSheet(b.dataset.copyMeal);
    };
  });

  // FAB quick add
  const fab = document.getElementById('fab-add');
  if (fab) fab.onclick = openFabMenu;

  // add from meal
  document.querySelectorAll('[data-add-search]').forEach(b => {
    b.onclick = () => {
      state.targetMeal = b.dataset.addSearch;
      state.tab = 'search';
      render();
      setTimeout(() => document.getElementById('q')?.focus(), 50);
    };
  });
  document.querySelectorAll('[data-add-quick]').forEach(b => {
    b.onclick = () => openQuickAddSheet(b.dataset.addQuick);
  });
  document.querySelectorAll('[data-add-template]').forEach(b => {
    b.onclick = () => openTemplatesSheet(b.dataset.addTemplate);
  });
  document.querySelectorAll('[data-add-custom]').forEach(b => {
    b.onclick = () => openCustomPicker(b.dataset.addCustom);
  });

  // search input
  const q = document.getElementById('q');
  if (q) {
    q.oninput = (e) => doSearch(e.target.value.trim());
  }
  const targetSelect = document.getElementById('target-meal-select');
  if (targetSelect) {
    targetSelect.onchange = (e) => { state.targetMeal = e.target.value; };
  }
  bindSearchResults();

  // profile navigation
  document.querySelectorAll('[data-go]').forEach(el => {
    el.onclick = () => {
      const go = el.dataset.go;
      if (go === 'goals') openGoalsSheet();
      if (go === 'customFoods') openCustomFoodsSheet();
      if (go === 'templates') openTemplatesSheet();
      if (go === 'dbFoods') openDbFoodsSheet();
      if (go === 'debug') openDebugSheet();
      if (go === 'cloud') openCloudSheet();
      if (go === 'export') handleExport();
      if (go === 'import') handleImport();
      if (go === 'migrate') openMigrateSheet();
      if (go === 'ai-setup') openAiSetupSheet();
      if (go === 'version-info') openVersionInfoSheet();
      if (go === 'logout') {
        if (state.user && state.user.authMode === 'github') {
          if (!confirm('Uscire da @' + state.user.githubLogin + '?\n\nIl token GitHub verrà rimosso da questo dispositivo. Per riaccedere lo dovrai incollare di nuovo (i tuoi dati restano nel gist).')) return;
          cloudBackup.clearConfig();
          logout();
        } else {
          if (!confirm('Uscire dall\'account?')) return;
          logout();
        }
      }
    };
  });
}
function bindSearchResults() {
  document.querySelectorAll('[data-pick]').forEach(el => {
    el.onclick = () => {
      const f = state.searchResults.find(x => String(x.id) === el.dataset.pick);
      if (f) openAddFood(f, state.targetMeal);
    };
  });
  document.querySelectorAll('[data-pick-tpl]').forEach(el => {
    el.onclick = async () => {
      const t = (state.searchTemplateResults || []).find(x => x.id === el.dataset.pickTpl);
      if (!t) return;
      await applyTemplate(t, state.targetMeal);
      toast(`"${t.name}" aggiunto a ${({breakfast:'Colazione',lunch:'Pranzo',dinner:'Cena',snack:'Spuntino'})[state.targetMeal] || 'pasto'}`);
      // Torna a Oggi per vedere il risultato
      state.tab = 'today';
      render();
    };
  });
  const retry = document.getElementById('search-retry');
  if (retry) retry.onclick = () => {
    if (state.searchQuery) doSearch(state.searchQuery);
  };
}

/* ─── GO! ──────────────────────────────────────────────── */
boot();
</script>

</html>
